    <style>
        :root {
            --dark:   #0A0A0A;
            --dark2:  #111110;
            --gold:   #B8973E;
            --gold2:  #D4AF6A;
            --white:  #FAFAF7;
            --bg:     #F4F1EB;
            --muted:  #8C8880;
            --border: #DDD9D0;
            --font-d: 'Playfair Display', serif;
            --font-e: 'Cormorant Garamond', serif;
            --font-s: 'Inter', sans-serif;
            --ease:   cubic-bezier(0.4,0,0.2,1);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { background:var(--white); color:var(--dark); font-family:var(--font-s); font-weight:300; line-height:1.65; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
        img  { display:block; width:100%; object-fit:cover; }
        a    { text-decoration:none; color:inherit; }
        .container { max-width:1200px; margin:0 auto; padding:0 40px; }
        @media(max-width:768px){ .container{ padding:0 20px; } }
        .section-label { display:block; font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; font-weight:500; }

        /* ── REVEAL ─────────────────────────────────── */
        .reveal { opacity:0; transform:translateY(30px); transition:opacity 0.9s var(--ease), transform 0.9s var(--ease); }
        .reveal.active { opacity:1; transform:translateY(0); }

        /* ── WORD BLUR ANIMATION ────────────────────── */
        @keyframes wordIn {
            from { opacity:0; filter:blur(10px); transform:translateY(16px); }
            to   { opacity:1; filter:blur(0);    transform:translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(18px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @keyframes lineGrow {
            from { width:0; }
            to   { width:48px; }
        }
        @keyframes scrollPulse {
            0%,100% { opacity:0.3; transform:translateY(0); }
            50%     { opacity:1;   transform:translateY(8px); }
        }
        /* Mobile hero — drop from above */
        @keyframes heroDrop {
            from { transform:scale(1.08) translateY(-5%); opacity:0; }
            to   { transform:scale(1.05) translateY(0);   opacity:1; }
        }
        .blur-word {
            display:inline-block; opacity:0;
            animation:wordIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
        }

        /* ── NAV ────────────────────────────────────── */
        nav {
            position:fixed; top:0; left:0; width:100%; z-index:1000;
            padding:22px 40px;
            display:flex; justify-content:space-between; align-items:center;
            transition:background 0.45s var(--ease), padding 0.45s var(--ease), box-shadow 0.45s var(--ease);
            color:var(--white);
        }
        nav.scrolled {
            background:rgba(250,250,247,0.97); backdrop-filter:blur(12px);
            color:var(--dark); padding:14px 40px;
            box-shadow:0 1px 0 var(--border);
        }

        /* Nav logo (replaces EST. MMXXIV) */
        .nav-logo-wrap { display:flex; align-items:center; }
        .nav-logo-img {
            height:50px; width:auto; object-fit:contain;
            filter:brightness(0) invert(1) drop-shadow(0 1px 4px rgba(0,0,0,0.3));
            transition:filter 0.45s;
        }
        nav.scrolled .nav-logo-img { filter:none; }

        /* Nav center — Cormorant Garamond, 20% bigger */
        .nav-center {
            font-family:var(--font-e); font-size:20px; letter-spacing:0.14em;
            text-transform:uppercase; font-weight:400; font-style:italic;
            position:absolute; left:50%; transform:translateX(-50%); white-space:nowrap;
        }
        .nav-right { display:flex; align-items:center; gap:20px; }
        .nav-phone { font-size:11px; letter-spacing:0.08em; }
        .lang-sw { display:flex; align-items:center; gap:2px; }
        .lang-btn {
            background:none; border:none; cursor:pointer;
            font-family:var(--font-s); font-size:10px; letter-spacing:0.12em;
            text-transform:uppercase; font-weight:500;
            color:inherit; opacity:0.45; transition:opacity 0.2s; padding:3px 5px;
        }
        .lang-btn:hover { opacity:0.9; }
        .lang-btn.active { opacity:1; border-bottom:1px solid currentColor; }
        .lang-div { font-size:9px; opacity:0.25; }

        @media(max-width:768px){
            nav { padding:18px 20px; background:rgba(250,250,247,0.97); color:var(--dark); backdrop-filter:blur(12px); box-shadow:0 1px 0 var(--border); }
            nav.scrolled { padding:18px 20px; }
            .nav-logo-wrap, .nav-right { display:none; }
            .nav-center { font-family:var(--font-e); font-size:18px; letter-spacing:0.1em; font-style:italic; }
        }

        /* Mobile logo + lang overlay */
        .mobile-top {
            display:none; position:absolute;
            top:72px; left:0; right:0; z-index:10;
            padding:0 20px;
            justify-content:space-between; align-items:center;
        }
        .mobile-logo-img {
            height:38px; width:auto;
            filter:brightness(0) invert(1) drop-shadow(0 1px 6px rgba(0,0,0,0.55));
        }
        .mobile-lang { display:flex; align-items:center; gap:4px; }
        .mobile-lang .lang-btn { color:#fff; font-size:12px; opacity:0.65; text-shadow:0 1px 6px rgba(0,0,0,0.6); }
        .mobile-lang .lang-btn.active { opacity:1; border-bottom:1px solid rgba(255,255,255,0.8); }
        .mobile-lang .lang-div { color:rgba(255,255,255,0.3); font-size:10px; }
        @media(max-width:767px){ .mobile-top{ display:flex; } }

        /* ── HERO ───────────────────────────────────── */
        .hero { position:relative; height:100vh; min-height:600px; overflow:hidden; display:flex; align-items:flex-end; }

        /* Desktop bg — Ken Burns cinematic zoom + drift */
        .hero-bg {
            position:absolute; inset:0; z-index:0;
            background:url('https://res.cloudinary.com/dr63qmw21/image/upload/v1780849595/IMG_6198_jtib9d.webp') center/cover no-repeat;
            will-change:transform;
            animation:kenBurns 28s ease-in-out infinite alternate;
        }
        @keyframes kenBurns {
            0%   { transform:scale(1.00) translate(0%,    0%);     filter:brightness(0.88); }
            20%  { transform:scale(1.06) translate(-0.8%, -0.5%);  filter:brightness(0.92); }
            50%  { transform:scale(1.10) translate(0.5%,  -1.0%);  filter:brightness(0.90); }
            80%  { transform:scale(1.07) translate(-0.4%, 0.6%);   filter:brightness(0.93); }
            100% { transform:scale(1.03) translate(0.6%,  -0.3%);  filter:brightness(0.88); }
        }

        /* Mobile bg — drop-from-above then Ken Burns */
        .hero-bg-mobile {
            display:none; position:absolute; inset:0; z-index:0;
            background:url('https://res.cloudinary.com/dr63qmw21/image/upload/v1780849595/IMG_6196_fantyh.webp') center/cover no-repeat;
            animation:heroDrop 1.2s cubic-bezier(0.22,1,0.36,1) forwards, kenBurns 28s ease-in-out 1.5s infinite alternate;
            opacity:0;
        }
        @media(max-width:767px){
            .hero-bg { display:none; }
            .hero-bg-mobile { display:block; }
        }

        /* Particle canvas */
        #heroCanvas {
            position:absolute; inset:0; z-index:2; pointer-events:none;
            width:100%; height:100%; opacity:0.55;
        }

        /* Diagonal light sweep */
        .hero-sweep {
            position:absolute; inset:0; z-index:2; pointer-events:none; overflow:hidden;
        }
        .hero-sweep::before {
            content:'';
            position:absolute;
            top:-100%; left:-60%;
            width:30%; height:300%;
            background:linear-gradient(90deg, transparent 0%, rgba(212,175,106,0.06) 40%, rgba(255,255,255,0.09) 50%, rgba(212,175,106,0.06) 60%, transparent 100%);
            transform:rotate(18deg);
            animation:lightSweep 18s ease-in-out 3s infinite;
        }
        @keyframes lightSweep {
            0%   { left:-60%; opacity:0; }
            5%   { opacity:1; }
            50%  { left:130%; opacity:1; }
            55%  { opacity:0; }
            100% { left:130%; opacity:0; }
        }

        /* Vignette + gradient overlay */
        .hero-overlay {
            position:absolute; inset:0; z-index:3;
            background:
                radial-gradient(ellipse at 60% 30%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.40) 70%),
                linear-gradient(180deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.18) 30%, rgba(0,0,0,0.78) 100%);
        }

        /* Hero content — shifted 15px lower on both */
        .hero-content { position:relative; z-index:4; padding:0 40px 65px; width:100%; }
        @media(max-width:768px){ .hero-content{ padding:0 20px 95px; } }

        /* Hero label — "Elegance. Comfort. Class." — bigger, more visible */
        .hero-pre {
            font-family:var(--font-e); font-size:14px; letter-spacing:0.22em;
            text-transform:uppercase; color:rgba(255,255,255,0.92);
            margin-bottom:18px; font-weight:400; font-style:italic;
            animation:fadeUp 0.7s ease forwards 0.3s; opacity:0;
        }

        /* Hero title — desktop 20% smaller, mobile 10% smaller */
        .hero-title {
            font-family:var(--font-d);
            font-size:clamp(42px,6.8vw,87px);
            font-weight:400; color:var(--white); line-height:1.0;
            margin-bottom:14px;
        }
        @media(max-width:767px){
            .hero-title { font-size:clamp(38px,9vw,60px); }
        }

        .hero-gold-line {
            height:1px; background:var(--gold2); margin-bottom:26px;
            width:0; animation:lineGrow 0.7s ease forwards 1.4s;
        }
        .hero-sub {
            font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
            color:rgba(255,255,255,0.52); margin-bottom:42px;
            animation:fadeUp 0.6s ease forwards 1.6s; opacity:0;
        }
        .hero-cta {
            display:inline-flex; align-items:center; gap:12px;
            border:1px solid rgba(255,255,255,0.45); color:var(--white);
            padding:15px 32px; font-size:10px; letter-spacing:0.22em;
            text-transform:uppercase; font-weight:500;
            transition:background 0.35s, border-color 0.35s;
            animation:fadeUp 0.6s ease forwards 1.8s; opacity:0;
        }
        .hero-cta:hover { background:var(--gold); border-color:var(--gold); }

        .scroll-cue {
            position:absolute; bottom:36px; right:40px; z-index:4;
            display:flex; flex-direction:column; align-items:center; gap:8px;
            font-size:9px; letter-spacing:0.22em; text-transform:uppercase;
            color:rgba(255,255,255,0.42);
            animation:fadeUp 0.6s ease forwards 2s; opacity:0;
        }
        .scroll-arrow { animation:scrollPulse 2s ease infinite 2.2s; }
        @media(max-width:768px){ .scroll-cue{ right:20px; bottom:130px; } }

        /* ── STATS BAR ──────────────────────────────── */
        .stats-bar { background:var(--dark2); padding:32px 0; }
        .stats-inner { display:grid; grid-template-columns:repeat(4,1fr); }
        .stat-item { padding:0 36px; border-left:1px solid rgba(255,255,255,0.08); text-align:center; }
        .stat-item:first-child { border-left:none; }
        .stat-num { font-family:var(--font-e); font-size:38px; font-style:italic; color:var(--gold2); display:block; margin-bottom:5px; }
        .stat-label { font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(255,255,255,0.38); }
        @media(max-width:768px){
            .stats-inner { grid-template-columns:repeat(2,1fr); gap:1px; background:rgba(255,255,255,0.06); }
            .stat-item { background:var(--dark2); border-left:none; padding:22px 16px; }
        }

        /* ── MANIFESTO ──────────────────────────────── */
        .manifesto { background:var(--white); padding:120px 0; text-align:center; }
        .manifesto-inner { max-width:700px; margin:0 auto; }
        .manifesto-title { font-family:var(--font-d); font-size:clamp(34px,4.5vw,58px); font-weight:400; font-style:italic; line-height:1.18; margin-bottom:28px; }
        .manifesto-text { font-size:15px; color:var(--muted); line-height:1.85; max-width:540px; margin:0 auto; }
        @media(max-width:768px){ .manifesto{ padding:80px 0; } }

        /* ── ROOMS ──────────────────────────────────── */
        .rooms { background:var(--bg); padding:100px 0; }
        .section-head { text-align:center; margin-bottom:56px; }
        .section-head h2 { font-family:var(--font-d); font-size:clamp(30px,4vw,50px); font-weight:400; font-style:italic; }
        .rooms-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:3px; }
        @media(max-width:768px){ .rooms-grid{ grid-template-columns:1fr; gap:14px; } }
        .room-card { position:relative; overflow:hidden; }
        .room-card-img { height:380px; transition:transform 0.9s var(--ease); }
        @media(max-width:768px){ .room-card-img{ height:260px; } }
        .room-card:hover .room-card-img { transform:scale(1.04); }
        .room-card-body {
            position:absolute; bottom:0; left:0; right:0; padding:28px;
            background:linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0) 100%);
            color:var(--white);
        }
        .room-card-label { font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold2); margin-bottom:6px; font-weight:500; }
        .room-card-name { font-family:var(--font-d); font-size:22px; font-style:italic; margin-bottom:10px; }
        .room-card-footer { display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(255,255,255,0.14); padding-top:12px; margin-top:4px; }
        .room-price { font-size:11px; letter-spacing:0.08em; opacity:0.65; }
        .room-link { font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--gold2); font-weight:500; transition:opacity 0.2s; }
        .room-link:hover { opacity:0.7; }

        /* ── SPA ────────────────────────────────────── */
        .spa { background:var(--dark2); color:var(--white); }
        .spa-inner { display:grid; grid-template-columns:1fr 1fr; min-height:580px; }
        .spa-img { overflow:hidden; }
        .spa-img img { height:100%; transition:transform 0.9s var(--ease); }
        .spa-img:hover img { transform:scale(1.03); }
        .spa-content { padding:80px 64px; display:flex; flex-direction:column; justify-content:center; }
        .spa-content h2 { font-family:var(--font-d); font-size:clamp(30px,3.2vw,50px); font-weight:400; font-style:italic; margin-bottom:22px; line-height:1.2; }
        .spa-content p { font-size:14px; color:rgba(255,255,255,0.5); line-height:1.9; margin-bottom:36px; }
        .gold-rule { width:44px; height:1px; background:var(--gold); margin-bottom:36px; }
        .spa-features { display:flex; flex-direction:column; gap:14px; }
        .spa-feature { display:flex; align-items:center; gap:14px; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.42); }
        .spa-feature::before { content:''; width:22px; height:1px; background:var(--gold); flex-shrink:0; }
        @media(max-width:768px){
            .spa-inner { grid-template-columns:1fr; }
            .spa-img { height:300px; }
            .spa-content { padding:52px 24px; }
        }

        /* ── RESTAURANT ─────────────────────────────── */
        .restaurant { background:var(--white); }
        .rest-inner { display:grid; grid-template-columns:1fr 1fr; min-height:540px; }
        .rest-content { padding:80px 64px; display:flex; flex-direction:column; justify-content:center; order:1; }
        .rest-img { overflow:hidden; order:2; }
        .rest-img img { height:100%; transition:transform 0.9s var(--ease); }
        .rest-img:hover img { transform:scale(1.03); }
        .rest-content h2 { font-family:var(--font-d); font-size:clamp(28px,3.2vw,46px); font-weight:400; font-style:italic; margin-bottom:20px; line-height:1.2; }
        .rest-content p { font-size:14px; color:var(--muted); line-height:1.9; margin-bottom:36px; }
        .rest-cta {
            display:inline-flex; align-items:center; gap:10px;
            border:1px solid var(--dark); color:var(--dark);
            padding:14px 28px; font-size:10px; letter-spacing:0.2em;
            text-transform:uppercase; font-weight:500;
            transition:background 0.3s, color 0.3s;
        }
        .rest-cta:hover { background:var(--dark); color:var(--white); }
        @media(max-width:768px){
            .rest-inner { grid-template-columns:1fr; }
            .rest-img { height:280px; order:1; }
            .rest-content { order:2; padding:50px 24px; }
        }

        /* ── AMENITIES ──────────────────────────────── */
        .amenities { background:var(--bg); padding:100px 0; }
        .amenities-grid { display:grid; grid-template-columns:repeat(3,1fr); border:1px solid var(--border); }
        @media(max-width:768px){ .amenities-grid{ grid-template-columns:repeat(2,1fr); } }
        .amenity-item { padding:40px 32px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
        .amenity-item:nth-child(3n){ border-right:none; }
        .amenity-icon { margin-bottom:16px; color:var(--gold); }
        .amenity-name { font-family:var(--font-d); font-size:17px; font-style:italic; margin-bottom:6px; }
        .amenity-desc { font-size:12px; color:var(--muted); line-height:1.7; }

        /* ── LOCATION ───────────────────────────────── */
        .location { background:var(--white); padding:100px 0; }
        .loc-inner { display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:center; }
        @media(max-width:768px){ .loc-inner{ grid-template-columns:1fr; gap:40px; } }
        .loc-map { overflow:hidden; height:440px; }
        .loc-map iframe { width:100%; height:100%; border:0; }
        .loc-content h2 { font-family:var(--font-d); font-size:clamp(28px,3vw,44px); font-weight:400; font-style:italic; margin-bottom:36px; }
        .distance-list { list-style:none; }
        .distance-item { display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid var(--border); font-size:13px; }
        .distance-item:last-child { border-bottom:none; }
        .dist-val { font-family:var(--font-d); font-size:16px; font-style:italic; color:var(--gold); }

        /* ── GALLERY ────────────────────────────────── */
        .gallery { background:var(--dark2); padding:100px 0; }
        .gallery .section-label { color:var(--gold2); }
        .gallery .section-head h2 { color:var(--white); }
        .gallery-grid {
            display:grid;
            grid-template-columns:2fr 1fr 1fr;
            grid-template-rows:290px 290px;
            gap:3px;
        }
        @media(max-width:768px){
            .gallery-grid { grid-template-columns:1fr 1fr; grid-template-rows:190px 190px 190px; }
            .gallery-item.tall { grid-row:auto; }
        }
        .gallery-item { overflow:hidden; position:relative; }
        .gallery-item img { height:100%; transition:transform 0.8s var(--ease), filter 0.35s; }
        .gallery-item:hover img { transform:scale(1.06); filter:brightness(0.82); }
        .gallery-item.tall { grid-row:1/3; }

        /* ── CTA ────────────────────────────────────── */
        .cta { background:var(--dark); padding:130px 0; text-align:center; }
        .cta .section-label { color:var(--gold2); }
        .cta h2 { font-family:var(--font-d); font-size:clamp(44px,7vw,96px); font-weight:400; font-style:italic; color:var(--white); margin-bottom:16px; line-height:1.08; }
        .cta-sub { font-size:12px; letter-spacing:0.1em; color:rgba(255,255,255,0.32); margin-bottom:52px; }
        .cta-btn {
            display:inline-flex; align-items:center; gap:12px;
            border:1px solid rgba(255,255,255,0.28); color:var(--white);
            padding:17px 40px; font-size:10px; letter-spacing:0.24em;
            text-transform:uppercase; font-weight:500;
            transition:background 0.35s, border-color 0.35s;
        }
        .cta-btn:hover { background:var(--gold); border-color:var(--gold); }

        /* ── FOOTER ─────────────────────────────────── */
        footer { background:var(--dark2); color:rgba(255,255,255,0.36); padding:52px 0 32px; }

// ================================================================
// LANGUAGE SYSTEM
// ================================================================
let currentLang = localStorage.getItem('lang') || 'en';
if (!T[currentLang]) currentLang = 'en';

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    const t = T[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        if (t[k] !== undefined) el.textContent = t[k];
    });
    buildHeroTitle(t.heroTitle);
    document.querySelectorAll('.lang-btn').forEach(btn => {
        const map = { en:'ENG', sq:'ALB', it:'ITA' };
        btn.classList.toggle('active', btn.textContent.trim() === map[lang]);
    });
}

// ================================================================
// HERO WORD-BLUR ANIMATION
// ================================================================
function buildHeroTitle(text) {
    const el = document.getElementById('heroTitle');
    const words = text.split(' ');
    el.innerHTML = words.map((word, i) =>
        `<span class="blur-word" style="animation-delay:${0.5 + i * 0.2}s">${word}</span>`
    ).join(' ');
}

// NAV SCROLL
// ================================================================
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 80);
}, { passive: true });

// ================================================================
// HERO PARALLAX — subtle overlay depth shift only (bg uses CSS Ken Burns)
// ================================================================
const heroCanvas = document.getElementById('heroCanvas');
window.addEventListener('scroll', () => {
    const y = window.pageYOffset;
    // Shift the particle canvas + overlay slightly for depth layering
    if (heroCanvas) heroCanvas.style.transform = 'translateY(' + (y * 0.12) + 'px)';
}, { passive: true });

// ================================================================
// SCROLL REVEAL
// ================================================================
const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

// ================================================================
// INIT
// ================================================================
document.addEventListener('DOMContentLoaded', () => setLang(currentLang));

// ================================================================
// HERO CANVAS — floating gold dust particles
// ================================================================
(function() {
  const canvas = document.getElementById('heroCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  window.addEventListener('resize', resize, { passive:true });
  resize();

  const GOLD   = [212, 175, 106];
  const WHITE  = [255, 250, 240];
  const N      = 90;   // particle count

  function rand(a, b) { return a + Math.random() * (b - a); }

  const particles = Array.from({ length: N }, () => ({
    x:    rand(0, 1),
    y:    rand(0, 1),
    r:    rand(0.4, 1.8),
    vx:   rand(-0.06, 0.06),
    vy:   rand(-0.12, -0.04),  // mostly drift upward
    a:    rand(0, 1),
    da:   rand(0.002, 0.007),
    color: Math.random() > 0.55 ? GOLD : WHITE,
    twinkle: rand(0, Math.PI * 2),
    twinkleSpeed: rand(0.01, 0.035),
  }));

  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    particles.forEach(p => {
      // Twinkle opacity
      const tOpacity = 0.25 + 0.55 * (0.5 + 0.5 * Math.sin(p.twinkle));
      p.twinkle += p.twinkleSpeed;

      const [r,g,b] = p.color;
      const px = p.x * W, py = p.y * H;

      // Soft glow
      const grd = ctx.createRadialGradient(px, py, 0, px, py, p.r * 3.5);
      grd.addColorStop(0, `rgba(${r},${g},${b},${tOpacity})`);
      grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.beginPath();
      ctx.arc(px, py, p.r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      // Core dot
      ctx.beginPath();
      ctx.arc(px, py, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(tOpacity * 1.6, 0.95)})`;
      ctx.fill();

      // Move
      p.x += p.vx * 0.001;
      p.y += p.vy * 0.001;
      p.a += p.da;

      // Wrap
      if (p.y < -0.02) { p.y = 1.02; p.x = rand(0, 1); }
      if (p.x < -0.02) p.x = 1.02;
      if (p.x > 1.02)  p.x = -0.02;
    });

    requestAnimationFrame(draw);
  }

  // Start after first paint
  requestAnimationFrame(draw);
})();
</script>
